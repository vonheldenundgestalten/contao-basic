services:
    _defaults:
        autowire: true
        autoconfigure: true

    VHUG\ContaoBasic\EventListener\AddStylesListener:
        shared: false
        arguments:
            $includeResetCss: '%vhug_contao_basic.include_reset_css%'
            $includeBasicStyles: '%vhug_contao_basic.include_basic_styles%'
        tags:
            - { name: contao.hook, hook: generatePage }
            
    VHUG\ContaoBasic\EventListener\AddBackendAssetsListener:
        arguments:
            $scopeMatcher: '@contao.routing.scope_matcher'
        tags:
            - { name: kernel.event_listener, event: kernel.request }
